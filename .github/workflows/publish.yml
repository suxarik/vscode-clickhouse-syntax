name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    name: Publish Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Sync version to tag (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VER" --no-git-tag-version --allow-same-version

      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          NEW_VER=$(jq -r .version package.json)
          echo "NEW_VERSION=$NEW_VER" >> "$GITHUB_ENV"

      - name: Commit and push new version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Compile TypeScript
        run: npm run compile

      - name: Package .vsix
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          OUTPUT=$(npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT" 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ] && ! echo "$OUTPUT" | grep -q "already exists"; then
            exit $STATUS
          fi
          echo "Publish step completed (version may already exist on Marketplace)."

      - name: Read version from package.json
        id: ver
        run: |
          VER=$(jq -r .version package.json)
          echo "value=$VER" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: notes
        run: |
          VER="${{ steps.ver.outputs.value }}"
          CONTENT=$(awk "/^## \[$VER\]/{f=1;next} f&&/^## \[/{exit} f{print}" CHANGELOG.md)
          printf 'body<<EOF\n%s\nEOF\n' "$CONTENT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.value }}
          name: ClickHouse SQL Syntax v${{ steps.ver.outputs.value }}
          body: |
            ${{ steps.notes.outputs.body }}

            ---
            Published to the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=SuXarikisme.clickhouse-syntax)

            Install:
            ```
            code --install-extension SuXarikisme.clickhouse-syntax
            ```
          files: "*.vsix"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
